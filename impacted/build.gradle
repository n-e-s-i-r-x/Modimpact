
plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

group = "com.example"
version = "1.0.0"

repositories {
    mavenCentral()
    maven { url = "https://maven.terraformersmc.com/releases/" }
    maven { url = "https://maven.shedaniel.me/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings "net.fabricmc:yarn:1.21.1+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.0"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21.1"

    modImplementation "com.terraformersmc:modmenu:11.0.0"
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}
